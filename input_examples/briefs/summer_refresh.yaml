campaign_id: summer_refresh_2026
campaign_name: Summer Refresh Launch
market: US
language: en
locales:
  - en
  - ja
target_audience: Young adults who want refreshing, flavorful drinks for active summer days, outdoor hangouts, and weekend adventures.
campaign_message: Refresh your summer with bright, feel-good flavor.
cta: Shop now

brand:
  name: Brightside
  primary_color: "#F8FAFC"
  secondary_color: "#111827"

visual_direction:
  setting: sunny outdoor summer scene
  style: modern social commerce ad photography
  mood:
    - fresh
    - bright
    - optimistic
  composition: product-forward with clean negative space for copy
  negative_space: lower-left
  avoid:
    - rendered text
    - third-party logos
    - cluttered background
    - unrealistic product shape

products:
  - id: sparkling_lemon_water
    name: Sparkling Lemon Water
    description: A zero-sugar sparkling water with natural lemon flavor and a bright citrus refreshment benefit.
    visual_notes: Show condensation, citrus slices, and a refreshing summer feel.

  - id: citrus_craft_soda
    name: Citrus Craft Soda
    description: A small-batch sparkling soda with bright citrus flavor, real fruit notes, and a crisp refreshing finish for hot summer afternoons.
    visual_notes: Show a chilled craft soda can or bottle with condensation, sliced oranges and lemons, ice, and a sunny outdoor table setting.

  - id: peach_black_iced_tea
    name: Peach Black Iced Tea
    description: A lightly sweetened black iced tea with ripe peach flavor and a smooth, refreshing taste for relaxed summer moments.
    visual_notes: Show a chilled iced tea bottle or can with peach slices, ice cubes, golden sunlight, and a relaxed patio or poolside summer setting.

